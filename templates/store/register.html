{% extends 'store/base.html' %}
{% block title %}Register – ShopEase{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo"><i class="fas fa-shopping-bag"></i> ShopEase</div>
    <h2>Create Account</h2>
    <form method="POST">
      {% csrf_token %}
      {% for field in form %}
        <div class="form-group">
          <label>{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<p class="field-error">{{ field.errors.0 }}</p>{% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{% url 'login' %}">Login</a></p>
  </div>
</div>
{% endblock %}
